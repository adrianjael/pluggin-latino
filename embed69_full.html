    body {
        margin: 0;
        padding: 0;
        font-family: 'Roboto Condensed', sans-serif;

    #DisplayContent {
        position: relative;
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    #PlayerDisplay {
        position: relative;
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /* Fake Player Styles */
    .fake-player-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
                background: linear-gradient(rgba(16, 16, 23, 0.71), #000000), url('https://image.tmdb.org/t/p/original/neeNHeXjMF5fXoCJRsOmkNGC7q.jpg');
                background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .play-button-overlay {
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        border: none;
        background: transparent;
        order: 1;
    }

    .play-button-overlay:hover {
        transform: scale(1.1);
    }
    
    .play-button-overlay:focus {
        outline: 3px solid rgba(0, 123, 255, 0.8);
        outline-offset: 5px;
    }

    .play-button-circle {
        width: 100px;
        height: 100px;
        background: rgba(0, 123, 255, 0.9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px rgba(0, 123, 255, 0.5);
        position: relative;
    }
    
    .play-button-circle::after {
        content: '';
        position: absolute;
        width: 120px;
        height: 120px;
        border: 2px solid rgba(0, 123, 255, 0.3);
        border-radius: 50%;
        animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
        0% {
            transform: scale(1);
            opacity: 1;
        }
        100% {
            transform: scale(1.3);
            opacity: 0;
        }
    }

    .play-button-circle i {
        font-size: 40px;
        color: white;
        margin-left: 5px;
    }
    
    .video-title-overlay {
        position: relative;
        color: white;
        text-align: center;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0 0 20px rgba(0, 0, 0, 0.7);
        max-width: 80%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
        padding: 20px 30px 10px;
        border-radius: 10px;
        order: 2;
    }
    
    .video-title-overlay h1 {
        font-size: 1.8rem;
        margin: 0 0 10px 0;
        font-weight: 600;
        line-height: 1.4;
    }
    
    .video-title-overlay .watching-label {
        font-size: 0.65em;
        font-weight: 400;
        opacity: 0.85;
        display: block;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
    }
    
    .video-title-overlay .video-name {
        font-size: 1em;
        font-weight: 700;
        display: block;
        text-transform: capitalize;
    }
    
    .video-title-overlay p {
        font-size: 1rem;
        margin: 0;
        opacity: 0.9;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
    }
    
    .video-title-overlay .language-flags {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
    }
    
    .video-title-overlay .language-flag-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    
    .video-title-overlay .language-flags img {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .video-title-overlay .language-name {
        font-size: 0.9em;
        font-weight: 600;
    }
    
    .video-title-overlay .separator {
        opacity: 0.7;
    }
    
    .video-title-overlay .online-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-weight: 600;
        color: #4ade80;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .video-title-overlay .online-badge::before {
        content: '';
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        animation: blink 2s infinite;
        box-shadow: 0 0 10px #4ade80;
    }
    
    @keyframes blink {
        0%, 100% {
            opacity: 1;
            transform: scale(1);
        }
        50% {
            opacity: 0.3;
            transform: scale(0.8);
        }
    }
    
    .video-title-overlay .server-count {
        font-weight: 600;
        color: #60a5fa;
    }

    /* Language Tabs */
    .language-tab-container {
        display: flex;
        overflow-x: auto;
        background-color: #1a1a1a;
        color: #fff;
        padding: 10px;
        gap: 8px;
        position: relative;
        overflow-y: visible;
        min-height: 50px;
        border-bottom: 2px solid #333;
    }

    .language-tab-container::-webkit-scrollbar {
        width: 8px;
        height: 6px;
    }

    .language-tab-container::-webkit-scrollbar-thumb {
        background: #007bff;
        border-radius: 4px;
    }

    .language-tab {
        display: flex;
        align-items: center;
        padding: 8px 15px;
        cursor: pointer;
        background-color: #2a2a2a;
        border-radius: 20px;
        position: static;
        flex: 0 0 auto;
        transition: all 0.3s;
        gap: 8px;
        border: none;
        color: white;
        font-family: inherit;
        font-size: 14px;
    }

    .language-tab:hover {
        background-color: #3a3a3a;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    .language-tab.active {
        background-color: #007bff;
        box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
    }
    
    .language-tab:focus {
        outline: 2px solid rgba(0, 123, 255, 0.8);
        outline-offset: 2px;
    }

    .language-tab img {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        object-fit: cover;
    }

    /* Server Tabs */
    .tab-container {
        display: flex;
        overflow-x: auto;
        background-color: #333;
        color: #fff;
        padding: 10px;
        gap: 8px;
        position: relative;
        overflow-y: visible;
        min-height: 37px;
        z-index: 100;
    }
    
    /* Warning Modal */
    .warning-modal {
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        color: #78350f;
        padding: 12px 16px;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        border-bottom: 2px solid #f59e0b;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        animation: slideDown 0.3s ease-out;
    }
    
    .warning-modal.hidden {
        display: none;
    }
    
    .warning-content {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
    }
    
    .warning-icon {
        font-size: 18px;
        animation: pulse 2s infinite;
    }
    
    .warning-text {
        font-weight: 500;
        line-height: 1.4;
    }
    
    .warning-close {
        background: rgba(120, 53, 15, 0.1);
        border: none;
        color: #78350f;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: bold;
        transition: all 0.2s;
        flex-shrink: 0;
    }
    
    .warning-close:hover {
        background: rgba(120, 53, 15, 0.2);
        transform: scale(1.1);
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .tab-container::-webkit-scrollbar {
        width: 8px;
        height: 6px;
    }

    .tab-container::-webkit-scrollbar-thumb {
        background: #007bff;
        border-radius: 4px;
    }

    .tab {
        display: flex;
        align-items: center;
        padding: 10px 15px;
        cursor: pointer;
        background-color: #444;
        border-radius: 20px;
        position: relative;
        flex: 0 0 auto;
        transition: all 0.3s;
        border: none;
        color: white;
        font-family: inherit;
    }
    
    .tab:hover {
        background-color: #555;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    
    .tab:focus {
        outline: 2px solid rgba(0, 123, 255, 0.8);
        outline-offset: 2px;
    }

    .tab-container {
        position: relative;
        z-index: 100;
    }

    .tab.active {
        background-color: #007bff;
    }

    .tab img {
        width: 18px;
        height: 18px;
        margin-right: 8px;
    }
    
    .tab span {
        font-size: 13px;
        font-weight: 500;
    }

    .iframe-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: none;
    }

    .iframe-container.active {
        display: block;
    }

    #iframePlayer {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* Estilos para el loader de descifrado */
    .decryption-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        flex-direction: column;
    }

    .decryption-loader.active {
        display: flex;
    }

    .loader-content {
        text-align: center;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .spinner {
        border: 5px solid rgba(255, 255, 255, 0.2);
        border-top: 5px solid #007bff;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        animation: spin 0.8s linear infinite;
    }
    
    .loader-text {
        font-size: 18px;
        font-weight: 500;
        color: #ffffff;
        text-align: center;
        max-width: 300px;
        line-height: 1.5;
    }
    
    .loader-subtext {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        margin-top: -10px;
    }

    async function decryptLinks(encryptedLinks) {

                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ links: encryptedLinks }) // enviamos array de cifrados
            });

            if (!response.ok){
                console.error('HTTP Error:', response.status, response.statusText);
                throw new Error(`HTTP Error: ${response.status}`);
            }

            const data = await response.json();

            if (data.success && Array.isArray(data.links)){
                // Procesar los enlaces descifrados para remover backticks y espacios extra
                return data.links.map(linkObj => {
                    if (typeof linkObj === 'object' && linkObj.link) {
                        linkObj.link = linkObj.link.replace(/`/g, '').trim();
                        return linkObj;
                    } else if (typeof linkObj === 'string') {
                        return linkObj.replace(/`/g, '').trim();
                    }
                    return linkObj;
                });
            } else {
                console.error('Invalid response structure:', data);
                throw new Error(data.reason || 'Failed to decrypt links');
            }
        } catch (error) {
            console.error('Error decrypting links:', error);
            return [];
        }
    }

    function updateDecryptionProgress(current, total) {

    // Función para descifrar todos los enlaces del array
    async function decryptAllLinks() {
        // Verificar que dataLink sea un array
        if (!Array.isArray(dataLink) || dataLink.length === 0) {
            console.error('dataLink debe ser un array no vacío:', dataLink);
            hideDecryptionLoader();
            return;
        }

        // Recopilar TODOS los enlaces cifrados de TODOS los archivos para una sola petición
        const allEncryptedLinks = [];
        const allLinkMappings = []; // Para mapear los resultados
        let totalLinksCount = 0;

        showDecryptionLoader();
        updateDecryptionProgress(0, 1); // Inicializar progreso

        // Iterar sobre todos los archivos para recolectar todos los enlaces
        dataLink.forEach((file, fileIndex) => {
            if (file.sortedEmbeds && Array.isArray(file.sortedEmbeds)) {
                file.sortedEmbeds.forEach((embed, embedIndex) => {
                    if (embed.link) {
                        allEncryptedLinks.push(embed.link);
                        allLinkMappings.push({ fileIndex, embedIndex, type: 'link' });
                        totalLinksCount++;
                    }
                    if (embed.download) {
                        allEncryptedLinks.push(embed.download);
                        allLinkMappings.push({ fileIndex, embedIndex, type: 'download' });
                        totalLinksCount++;
                    }
                });
            }
        });

        if (allEncryptedLinks.length === 0) {
            hideDecryptionLoader();
            return;
        }

        updateDecryptionProgress(0, totalLinksCount);

        try {
            // Descifrar TODOS los enlaces en una sola petición
            const decryptedResults = await decryptLinks(allEncryptedLinks);

            // Actualizar los enlaces descifrados en todos los archivos
            let resultIndex = 0;
            allLinkMappings.forEach(mapping => {
                if (resultIndex < decryptedResults.length && dataLink[mapping.fileIndex]) {
                    const decryptedLink = decryptedResults[resultIndex];
                    if (mapping.type === 'link') {
                        dataLink[mapping.fileIndex].sortedEmbeds[mapping.embedIndex].link = decryptedLink;
                    } else if (mapping.type === 'download') {
                        dataLink[mapping.fileIndex].sortedEmbeds[mapping.embedIndex].download = decryptedLink;
                    }
                }
                resultIndex++;
            });

            updateDecryptionProgress(totalLinksCount, totalLinksCount);

        } catch (error) {
            console.error('Error descifrando enlaces:', error);
            // Si falla, mantener los originales
        }
        
        hideDecryptionLoader();
    }
